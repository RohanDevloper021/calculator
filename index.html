<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rohandev Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top,#0f172a,#020617);
}

/* Canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* Calculator */
.calculator{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  border-radius:25px;
  padding:25px;
  width:330px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  transition:0.2s;
}

/* Shake */
.shake{
  animation:shake 0.4s;
}

@keyframes shake{
  0%{transform:translate(-50%,-50%) translateX(0);}
  25%{transform:translate(-50%,-50%) translateX(-10px);}
  50%{transform:translate(-50%,-50%) translateX(10px);}
  75%{transform:translate(-50%,-50%) translateX(-10px);}
  100%{transform:translate(-50%,-50%) translateX(0);}
}

/* Display */
.display{
  width:100%;
  height:70px;
  border:none;
  outline:none;
  text-align:right;
  font-size:28px;
  padding:15px;
  border-radius:15px;
  background:rgba(0,0,0,0.5);
  color:#00f5ff;
  margin-bottom:20px;
  transition:0.3s;
}

.error{
  color:#ff4d6d !important;
  box-shadow:0 0 20px #ff4d6d !important;
}

/* Buttons */
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

button{
  height:60px;
  border:none;
  border-radius:14px;
  font-size:18px;
  cursor:pointer;
  background:rgba(255,255,255,0.1);
  color:white;
  transition:0.15s;
}

button:hover{
  background:rgba(255,255,255,0.2);
}

button:active{
  transform:scale(0.9);
  box-shadow:0 0 15px #00f5ff;
}

.operator{color:#4f8cff;}
.equal{grid-column:span 2;color:#00ff9f;}
.clear{color:#ff4d6d;}

/* Footer */
.footer{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.6);
  font-size:14px;
  letter-spacing:1px;
  animation:fadeIn 2s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="calculator" id="calc">
  <input type="text" id="display" class="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="press('C')">C</button>
    <button onclick="press('⌫')">⌫</button>
    <button class="operator" onclick="press('/')">÷</button>
    <button class="operator" onclick="press('*')">×</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="operator" onclick="press('-')">−</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="operator" onclick="press('+')">+</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button class="equal" onclick="press('=')">=</button>
  </div>
</div>

<div class="footer">© 2026 Rohandev</div>

<!-- Sounds -->
<audio id="tap" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>
<audio id="result" src="https://www.fesliyanstudios.com/play-mp3/6677"></audio>

<script>
const display=document.getElementById("display");
const calcBox=document.getElementById("calc");
const tap=document.getElementById("tap");
const result=document.getElementById("result");

let errorTimeout;

function sound(type="tap"){
  let s=type==="tap"?tap:result;
  s.currentTime=0;
  s.play();
}

function calc(expr){
  try{
    return Function('"use strict";return ('+expr+')')();
  }catch{
    return "Error";
  }
}

function showError(){
  display.value="Error";
  display.classList.add("error");
  calcBox.classList.add("shake");

  setTimeout(()=>calcBox.classList.remove("shake"),400);

  clearTimeout(errorTimeout);
  errorTimeout=setTimeout(()=>{
    display.value="";
    display.classList.remove("error");
  },2000);
}

function press(val){
  sound();

  if(display.value==="Error" && val!=="=" && val!=="C"){
    display.value="";
    display.classList.remove("error");
  }

  if(val==="C"){
    display.value="";
    display.classList.remove("error");
  }
  else if(val==="⌫"){
    display.value=display.value.slice(0,-1);
  }
  else if(val==="="){
    let r=calc(display.value);
    if(r==="Error") showError();
    else{
      display.value=r;
      sound("result");
    }
  }
  else display.value+=val;
}

document.addEventListener("keydown",e=>{
  if(!isNaN(e.key)||"+-*/.".includes(e.key)) press(e.key);
  else if(e.key==="Enter") press("=");
  else if(e.key==="Backspace") press("⌫");
  else if(e.key==="Escape") press("C");
});

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let mouse={x:null,y:null};

window.addEventListener("mousemove",e=>{
  mouse.x=e.x;
  mouse.y=e.y;
});

let particles=[];
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="#00f5ff";
    ctx.fill();

    particles.forEach(p2=>{
      let dist=Math.hypot(p.x-p2.x,p.y-p2.y);
      if(dist<100){
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(p2.x,p2.y);
        ctx.strokeStyle="rgba(0,245,255,0.1)";
        ctx.stroke();
      }
    });

    if(mouse.x){
      let dist=Math.hypot(p.x-mouse.x,p.y-mouse.y);
      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(mouse.x,mouse.y);
        ctx.strokeStyle="rgba(0,245,255,0.3)";
        ctx.stroke();
      }
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
